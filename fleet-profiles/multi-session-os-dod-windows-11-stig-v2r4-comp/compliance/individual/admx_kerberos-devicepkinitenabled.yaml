apiVersion: v1
kind: policy
spec:
  platform: windows
  name: 'STIG - Ensure ''Device PKInit Enabled'' is set to ''Enabled'''
  query: >-
    SELECT 1 FROM mdm_bridge WHERE mdm_command_input = '<SyncBody><Get><CmdID>1</CmdID><Item><Target><LocURI>./Device/Vendor/MSFT/Policy/Config/ADMX_Kerberos/DevicePKInitEnabled</LocURI></Target></Item></Get></SyncBody>' AND mdm_command_output LIKE '%<enabled/>%';
  purpose: Informational
  tags: framework:DISA-STIG, benchmark:DISA-STIG, platform:windows, control:win11-stig-v2r4:kerberos-devicepkinitenabled
  description: 'STIG setting: ./Device/Vendor/MSFT/Policy/Config/ADMX_Kerberos/DevicePKInitEnabled'
  resolution: 'To establish the recommended configuration via configuration profiles, set the following Settings Catalog path. Policy\Config\ADMX_Kerberos\DevicePKInitEnabled'