apiVersion: v1
kind: policy
spec:
  platform: windows
  name: 'STIG - Ensure ''Deny Remote Desktop Services Log On'' is set to ''Enabled'''
  query: SELECT 1 FROM mdm_bridge WHERE mdm_command_input = '<SyncBody><Get><CmdID>1</CmdID><Item><Target><LocURI>./Device/Vendor/MSFT/Policy/Result/UserRights/DenyRemoteDesktopServicesLogOn</LocURI></Target></Item></Get></SyncBody>' AND mdm_command_output = '1';
  purpose: Informational
  tags: framework:DISA-STIG, benchmark:DISA-STIG, platform:windows, control:win11-stig-v2r4:userrights-denyremotedesktopserviceslogon
  description: 'This user right determines which users and groups are prohibited from logging on as a Remote Desktop Services client.'
  resolution: 'To establish the recommended configuration via configuration profiles, set the following Settings Catalog path. Policy\Config\UserRights\DenyRemoteDesktopServicesLogOn'