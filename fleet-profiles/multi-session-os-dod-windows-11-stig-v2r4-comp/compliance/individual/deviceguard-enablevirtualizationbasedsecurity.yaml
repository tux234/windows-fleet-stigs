apiVersion: v1
kind: policy
spec:
  platform: windows
  name: 'STIG - Ensure ''Enable Virtualization Based Security'' is set to ''Enabled'''
  query: SELECT 1 FROM mdm_bridge WHERE mdm_command_input = '<SyncBody><Get><CmdID>1</CmdID><Item><Target><LocURI>./Device/Vendor/MSFT/Policy/Result/DeviceGuard/EnableVirtualizationBasedSecurity</LocURI></Target></Item></Get></SyncBody>' AND mdm_command_output = '1';
  purpose: Informational
  tags: framework:DISA-STIG, benchmark:DISA-STIG, platform:windows, control:win11-stig-v2r4:deviceguard-enablevirtualizationbasedsecurity
  description: 'Turns On Virtualization Based Security(VBS)'
  resolution: 'To establish the recommended configuration via configuration profiles, set the following Settings Catalog path. Policy\Config\DeviceGuard\EnableVirtualizationBasedSecurity'