apiVersion: v1
kind: policy
spec:
  platform: windows
  name: 'STIG - Ensure ''Default Inbound Action'' is set to ''Enabled'''
  query: SELECT 1 FROM mdm_bridge WHERE mdm_command_input = '<SyncBody><Get><CmdID>1</CmdID><Item><Target><LocURI>./Vendor/MSFT/Firewall/MdmStore/DomainProfile/DefaultInboundAction</LocURI></Target></Item></Get></SyncBody>' AND mdm_command_output = '1';
  purpose: Informational
  tags: framework:DISA-STIG, benchmark:DISA-STIG, platform:windows, control:defaultinboundaction-1
  description: 'This value is the action that the firewall does by default (and evaluates at the very end) on inbound connections. The allow action is represented by 0x00000000; 0x00000001 represents a block action. Default value is 1 [Block]. The merge law for this option is to let the value of the GroupPolicyRSoPStore.win if it is configured; otherwise, the local store value is used.'
  resolution: 'To establish the recommended configuration via configuration profiles, set the following Settings Catalog path. MdmStore\DomainProfile\DefaultInboundAction'