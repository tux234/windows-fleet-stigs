apiVersion: v1
kind: policy
spec:
  platform: windows
  name: 'STIG - Ensure ''CSE Registry'' is set to ''Enabled'''
  query: >-
    SELECT 1 FROM mdm_bridge WHERE mdm_command_input = '<SyncBody><Get><CmdID>1</CmdID><Item><Target><LocURI>./Device/Vendor/MSFT/Policy/Config/ADMX_GroupPolicy/CSE_Registry</LocURI></Target></Item></Get></SyncBody>' AND mdm_command_output LIKE '%<enabled/>%';
  purpose: Informational
  tags: framework:DISA-STIG, benchmark:DISA-STIG, platform:windows, control:win10-stig-v3r4:cse-registry
  description: 'STIG setting: ./Device/Vendor/MSFT/Policy/Config/ADMX_GroupPolicy/CSE_Registry'
  resolution: 'To establish the recommended configuration via configuration profiles, set the following Settings Catalog path. Policy\Config\ADMX_GroupPolicy\CSE_Registry'