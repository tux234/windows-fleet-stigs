apiVersion: v1
kind: policy
spec:
  platform: windows
  name: 'STIG - Ensure ''Let Apps Activate With Voice Above Lock'' is set to ''2'''
  query: >-
    SELECT 1 FROM mdm_bridge WHERE mdm_command_input = '<SyncBody><Get><CmdID>1</CmdID><Item><Target><LocURI>./Device/Vendor/MSFT/Policy/Config/Privacy/LetAppsActivateWithVoiceAboveLock</LocURI></Target></Item></Get></SyncBody>' AND mdm_command_output = '2';
  purpose: Informational
  tags: framework:DISA-STIG, benchmark:DISA-STIG, platform:windows, control:win10-stig-v3r4:privacy-letappsactivatewithvoiceabovelock
  description: 'This policy setting specifies whether Windows apps can be activated by voice while the system is locked.'
  resolution: 'To establish the recommended configuration via configuration profiles, set the following Settings Catalog path. Policy\Config\Privacy\LetAppsActivateWithVoiceAboveLock'