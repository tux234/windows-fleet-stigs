apiVersion: v1
kind: policy
spec:
  platform: windows
  name: 'STIG - Ensure ''Facial Features Use Enhanced Anti Spoofing'' is set to ''Enabled'''
  query: SELECT 1 FROM mdm_bridge WHERE mdm_command_input = '<SyncBody><Get><CmdID>1</CmdID><Item><Target><LocURI>./Device/Vendor/MSFT/PassportForWork/Biometrics/FacialFeaturesUseEnhancedAntiSpoofing</LocURI></Target></Item></Get></SyncBody>' AND mdm_command_output = 'true';
  purpose: Informational
  tags: framework:DISA-STIG, benchmark:DISA-STIG, platform:windows, control:win10-stig-v3r4:biometrics-facialfeaturesuseenhancedantispoofing
  description: 'This setting determines whether enhanced anti-spoofing is required for Windows Hello face authentication. If you enable this setting, Windows requires all users on managed devices to use enhanced anti-spoofing for Windows Hello face authentication. This disables Windows Hello face authentication on devices that do not support enhanced anti-spoofing. If you disable or do not configure this setting, Windows doesn''t require enhanced anti-spoofing for Windows Hello face authentication. Note that enhanced anti-spoofing for Windows Hello face authentication is not required on unmanaged devices.'
  resolution: 'To establish the recommended configuration via configuration profiles, set the following Settings Catalog path. PassportForWork\Biometrics\FacialFeaturesUseEnhancedAntiSpoofing'