apiVersion: v1
kind: policy
spec:
  platform: windows
  name: 'STIG - Ensure ''Min Device Password Length'' is set to ''14'''
  query: SELECT 1 FROM mdm_bridge WHERE mdm_command_input = '<SyncBody><Get><CmdID>1</CmdID><Item><Target><LocURI>./Device/Vendor/MSFT/Policy/Result/DeviceLock/MinDevicePasswordLength</LocURI></Target></Item></Get></SyncBody>' AND mdm_command_output = '14';
  purpose: Informational
  tags: framework:DISA-STIG, benchmark:DISA-STIG, platform:windows, control:win10-stig-v3r4:devicelock-mindevicepasswordlength
  description: 'Specifies the minimum number or characters required in the PIN or password.'
  resolution: 'To establish the recommended configuration via configuration profiles, set the following Settings Catalog path. Policy\Config\DeviceLock\MinDevicePasswordLength'