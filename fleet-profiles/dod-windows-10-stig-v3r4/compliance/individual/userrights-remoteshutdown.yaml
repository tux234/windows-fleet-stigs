apiVersion: v1
kind: policy
spec:
  platform: windows
  name: 'STIG - Ensure ''Remote Shutdown'' is set to ''Enabled'''
  query: SELECT 1 FROM mdm_bridge WHERE mdm_command_input = '<SyncBody><Get><CmdID>1</CmdID><Item><Target><LocURI>./Device/Vendor/MSFT/Policy/Result/UserRights/RemoteShutdown</LocURI></Target></Item></Get></SyncBody>' AND mdm_command_output = '1';
  purpose: Informational
  tags: framework:DISA-STIG, benchmark:DISA-STIG, platform:windows, control:win10-stig-v3r4:userrights-remoteshutdown
  description: 'This user right determines which users are allowed to shut down a computer from a remote location on the network. Misuse of this user right can result in a denial of service.'
  resolution: 'To establish the recommended configuration via configuration profiles, set the following Settings Catalog path. Policy\Config\UserRights\RemoteShutdown'